<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUSPEGA – System Monitorowania</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Style takie same jak wcześniej – możesz skopiować z poprzednich wersji */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        :root {
            --bg-main: #0a0c10;
            --bg-card: #111214;
            --bg-sidebar: #0f1117;
            --border: #1e2128;
            --text: #e0e0e0;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #1a1c22;
            --table-header: #0f1117;
            --table-row: #111214;
            --progress-bg: #2d2f36;
        }
        body.light {
            --bg-main: #f3f4f6;
            --bg-card: #ffffff;
            --bg-sidebar: #f9fafb;
            --border: #e5e7eb;
            --text: #1f2937;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #ffffff;
            --table-header: #f9fafb;
            --table-row: #ffffff;
            --progress-bg: #e5e7eb;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }
        /* LOGIN / REGISTER OVERLAY */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 35px -10px black;
        }
        .auth-card h2 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            margin-top: 12px;
        }
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .switch-mode span {
            color: var(--accent);
            cursor: pointer;
        }
        .error-msg {
            color: #f87171;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
        .oauth-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .oauth-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text);
        }
        /* DASHBOARD */
        .dashboard {
            display: none;
            height: 100vh;
            width: 100%;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            background: #2d2f36;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--accent);
        }
        .avatar i {
            font-size: 22px;
            color: var(--text-muted);
        }
        .greeting {
            font-weight: 500;
        }
        .datetime {
            font-family: monospace;
            background: var(--input-bg);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 14px;
        }
        .main-layout {
            display: flex;
            height: calc(100vh - 74px);
        }
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            overflow-y: auto;
        }
        .nav-item {
            padding: 12px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .nav-item.active {
            background: #1e293b;
            color: var(--accent);
        }
        .nav-item:hover:not(.active) {
            background: var(--input-bg);
            color: var(--text);
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active-tab {
            display: block;
        }
        #map {
            height: calc(100vh - 130px);
            border-radius: 20px;
            background: #000;
        }
        .victims-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--table-row);
            border-radius: 20px;
            overflow: hidden;
        }
        .victims-table th, .victims-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .victims-table th {
            background: var(--table-header);
            color: var(--text-muted);
            font-size: 13px;
        }
        .access-btn {
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            font-size: 24px;
            color: var(--accent);
            background: var(--bg-card);
            border-radius: 28px;
        }
        .settings-popup {
            position: absolute;
            top: 80px;
            left: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            width: 260px;
            display: none;
            z-index: 200;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        .settings-popup h4 {
            margin-bottom: 12px;
        }
        .settings-popup button {
            width: 100%;
            margin-top: 12px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 30px;
            cursor: pointer;
        }
        .settings-popup select {
            width: 100%;
            padding: 6px;
            margin-top: 8px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .builder-form {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .builder-form .input-group {
            margin-bottom: 20px;
        }
        .builder-form input, .builder-form select {
            width: 100%;
        }
        .file-input {
            border: 1px dashed var(--border);
            padding: 12px;
            text-align: center;
            border-radius: 16px;
            cursor: pointer;
        }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.2s;
        }
        .subscription-plans {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .plan-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            width: 200px;
            text-align: center;
        }
        .plan-card.current {
            border: 2px solid var(--accent);
            background: var(--bg-card);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        select.admin-select {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }
        button.admin-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
    <div class="auth-card" id="authCard"></div>
</div>

<div class="dashboard" id="dashboard">
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="avatarBtn">
                <i class="fas fa-user"></i>
            </div>
            <div class="greeting" id="greetingText">Hello, user</div>
        </div>
        <div class="datetime" id="clock"></div>
    </div>
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="nav-item active" data-tab="map"><i class="fas fa-map"></i> Map</div>
            <div class="nav-item" data-tab="victims"><i class="fas fa-users"></i> Victims</div>
            <div class="nav-item" data-tab="passwords"><i class="fas fa-key"></i> Passwords</div>
            <div class="nav-item" data-tab="builder"><i class="fas fa-cogs"></i> Builder</div>
            <div class="nav-item" data-tab="subscription"><i class="fas fa-tag"></i> Subskrypcja</div>
        </div>
        <div class="content-area">
            <div id="tab-map" class="tab-pane active-tab">
                <div id="map"></div>
            </div>
            <div id="tab-victims" class="tab-pane">
                <table class="victims-table">
                    <thead>
                        <tr><th>Machine Name</th><th>Country</th><th>Date/Time</th><th>OS</th><th>IP</th><th>Action</th></tr>
                    </thead>
                    <tbody id="victimsTableBody">
                        <tr><td colspan="6" style="text-align:center;">Brak danych – Coming Soon</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="tab-passwords" class="tab-pane">
                <div class="coming-soon">Coming Soon</div>
            </div>
            <div id="tab-builder" class="tab-pane">
                <div class="builder-form">
                    <h3>Konfigurator aplikacji</h3>
                    <div class="input-group">
                        <label>Nazwa aplikacji</label>
                        <input type="text" id="appName" placeholder="np. SystemMonitor">
                    </div>
                    <div class="input-group">
                        <label>Rozmiar pliku (MB)</label>
                        <select id="appSize">
                            <option>1 MB</option>
                            <option>5 MB</option>
                            <option>10 MB</option>
                            <option>25 MB</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Logo (plik obrazu)</label>
                        <div class="file-input" id="logoUpload">
                            <i class="fas fa-upload"></i> Wybierz logo
                            <input type="file" accept="image/*" style="display:none" id="logoFile">
                        </div>
                    </div>
                    <button class="btn" id="buildAppBtn">Potwierdź i zainstaluj</button>
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p id="progressText">Instalacja...</p>
                    </div>
                </div>
            </div>
            <div id="tab-subscription" class="tab-pane">
                <div class="subscription-plans" id="subscriptionPlans"></div>
            </div>
            <div id="tab-admin" class="tab-pane">
                <h3>Zarządzanie użytkownikami</h3>
                <table class="admin-table" id="adminTable">
                    <thead><tr><th>Nazwa</th><th>Email</th><th>Rola</th><th>Subskrypcja</th><th>Zablokowany</th><th>Akcje</th></tr></thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="settingsPopup" class="settings-popup">
    <h4><i class="fas fa-sliders-h"></i> Ustawienia</h4>
    <button id="logoutBtn">Wyloguj się</button>
    <div style="margin-top:12px">
        <label>Tryb:</label>
        <select id="themeSelect">
            <option value="dark">Ciemny</option>
            <option value="light">Jasny</option>
        </select>
    </div>
    <div style="margin-top:12px">
        <label>Język:</label>
        <select id="langSelect">
            <option value="pl">Polski</option>
            <option value="en">English</option>
        </select>
    </div>
    <div style="margin-top:12px">
        <label>Strefa czasowa:</label>
        <p style="font-size:12px; margin-top:4px">Polska (UTC+1 / UTC+2)</p>
    </div>
</div>

<script>
    // ===================== KONFIGURACJA =====================
    const API_BASE = 'https://suspega.onrender.com/';  // <-- ZMIEŃ NA SWÓJ ADRES BACKENDU

    // ===================== POMOCNICZE =====================
    let mapInstance = null;

    // Funkcje pomocnicze do API
    async function apiRequest(endpoint, options = {}) {
        const token = localStorage.getItem('token');
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const response = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers
        });
        if (!response.ok) {
            const error = await response.text();
            throw new Error(error || 'API error');
        }
        return response.json();
    }

    // Zegar
    function updateClock() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'Europe/Warsaw' };
        const formatted = now.toLocaleString('pl-PL', options);
        document.getElementById("clock").innerText = formatted;
    }

    // Mapa
    function initMap() {
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
            subdomains: 'abcd',
            minZoom: 1,
            maxZoom: 18
        }).addTo(mapInstance);
    }

    // ===================== LOGOWANIE / REJESTRACJA =====================
    function renderAuth(mode = "login") {
        const container = document.getElementById("authCard");
        if (mode === "login") {
            container.innerHTML = `
                <h2>SUSPEGA</h2>
                <p>Zaloguj się lub użyj konta społecznościowego</p>
                <div class="oauth-buttons">
                    <div class="oauth-btn" id="discordLogin"><i class="fab fa-discord"></i> Discord</div>
                    <div class="oauth-btn" id="googleLogin"><i class="fab fa-google"></i> Google</div>
                </div>
                <div style="text-align:center; margin:10px 0">lub</div>
                <div class="input-group"><label>Nazwa użytkownika</label><input type="text" id="loginUsername" placeholder="nazwa"></div>
                <div class="input-group"><label>Hasło</label><input type="password" id="loginPassword" placeholder="••••••"></div>
                <button class="btn" id="loginBtn">Zaloguj</button>
                <div class="switch-mode">Nie masz konta? <span id="switchToRegisterLink">Zarejestruj się</span></div>
                <div id="authError" class="error-msg"></div>
            `;
            document.getElementById("discordLogin").onclick = () => oauthLogin('discord');
            document.getElementById("googleLogin").onclick = () => oauthLogin('google');
            document.getElementById("loginBtn").onclick = async () => {
                const username = document.getElementById("loginUsername").value.trim();
                const password = document.getElementById("loginPassword").value;
                try {
                    const data = await apiRequest('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showDashboard();
                } catch (err) {
                    document.getElementById("authError").innerText = err.message;
                }
            };
            document.getElementById("switchToRegisterLink").onclick = () => renderAuth("register");
        } else {
            container.innerHTML = `
                <h2>Rejestracja</h2>
                <p>Wymagany kod zaproszenia</p>
                <div class="input-group"><label>Nazwa użytkownika</label><input type="text" id="regUsername" placeholder="nazwa"></div>
                <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="email@example.com"></div>
                <div class="input-group"><label>Hasło</label><input type="password" id="regPassword" placeholder="••••••"></div>
                <div class="input-group"><label>Kod zaproszenia</label><input type="text" id="regInvite" placeholder="KOD"></div>
                <button class="btn" id="registerBtn">Zarejestruj</button>
                <button class="btn btn-secondary" id="switchToLoginBtn">Powrót do logowania</button>
                <div id="authError" class="error-msg"></div>
            `;
            document.getElementById("registerBtn").onclick = async () => {
                const username = document.getElementById("regUsername").value.trim();
                const email = document.getElementById("regEmail").value.trim();
                const password = document.getElementById("regPassword").value;
                const inviteCode = document.getElementById("regInvite").value.trim();
                try {
                    const data = await apiRequest('/auth/register', {
                        method: 'POST',
                        body: JSON.stringify({ username, email, password, inviteCode })
                    });
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showDashboard();
                } catch (err) {
                    document.getElementById("authError").innerText = err.message;
                }
            };
            document.getElementById("switchToLoginBtn").onclick = () => renderAuth("login");
        }
    }

    async function oauthLogin(provider) {
        // W prawdziwym OAuth frontend przekierowuje na endpoint backendu, który wykonuje OAuth.
        // Ale na razie uproszczamy – backend ma endpoint /oauth2/authorization/{provider}
        window.location.href = `${API_BASE}/oauth2/authorization/${provider}`;
    }

    // ===================== DASHBOARD =====================
    async function showDashboard() {
        document.getElementById("authOverlay").style.display = "none";
        const dashboard = document.getElementById("dashboard");
        dashboard.style.display = "block";

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById("greetingText").innerHTML = `Witaj, ${user.username || ''}`;

        initMap();
        updateClock();
        setInterval(updateClock, 1000);

        // Pobierz dane użytkownika z backendu (w tym role, subskrypcję)
        try {
            const userData = await apiRequest('/api/me');
            localStorage.setItem('user', JSON.stringify(userData));
            // Jeśli userData.role === 'ADMIN' – dodaj zakładkę Admin
            const sidebar = document.getElementById("sidebar");
            let adminTab = document.querySelector(".nav-item[data-tab='admin']");
            if (userData.role === 'ADMIN' && !adminTab) {
                const newAdminTab = document.createElement('div');
                newAdminTab.className = 'nav-item';
                newAdminTab.setAttribute('data-tab', 'admin');
                newAdminTab.innerHTML = '<i class="fas fa-shield-alt"></i> Admin';
                sidebar.appendChild(newAdminTab);
                newAdminTab.onclick = () => switchTab('admin');
            } else if (userData.role !== 'ADMIN' && adminTab) {
                adminTab.remove();
            }
            // Subskrypcja
            renderSubscriptionPlans(userData.subscription);
            // Jeśli admin, załaduj listę użytkowników
            if (userData.role === 'ADMIN') {
                await loadAdminPanel();
            }
        } catch (err) {
            console.error('Błąd ładowania danych użytkownika:', err);
        }

        // Obsługa zakładek
        function switchTab(tabId) {
            document.querySelectorAll(".nav-item").forEach(nav => nav.classList.remove("active"));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add("active");
            document.querySelectorAll(".tab-pane").forEach(pane => pane.classList.remove("active-tab"));
            const activePane = document.getElementById(`tab-${tabId}`);
            if (activePane) activePane.classList.add("active-tab");
            if (tabId === "map" && mapInstance) setTimeout(() => mapInstance.invalidateSize(), 100);
        }
        document.querySelectorAll(".nav-item").forEach(item => {
            item.onclick = () => switchTab(item.getAttribute("data-tab"));
        });

        // Ustawienia
        const avatarBtn = document.getElementById("avatarBtn");
        const settingsPopup = document.getElementById("settingsPopup");
        avatarBtn.onclick = (e) => {
            e.stopPropagation();
            settingsPopup.style.display = settingsPopup.style.display === "block" ? "none" : "block";
        };
        document.addEventListener("click", () => settingsPopup.style.display = "none");
        settingsPopup.addEventListener("click", (e) => e.stopPropagation());

        document.getElementById("logoutBtn").onclick = () => {
            localStorage.clear();
            window.location.reload();
        };
        const themeSelect = document.getElementById("themeSelect");
        const savedTheme = localStorage.getItem('theme') || 'dark';
        themeSelect.value = savedTheme;
        setTheme(savedTheme);
        themeSelect.onchange = () => setTheme(themeSelect.value);

        const langSelect = document.getElementById("langSelect");
        const savedLang = localStorage.getItem('lang') || 'pl';
        langSelect.value = savedLang;
        setLanguage(savedLang);
        langSelect.onchange = () => setLanguage(langSelect.value);
    }

    function setTheme(theme) {
        if (theme === 'light') document.body.classList.add('light');
        else document.body.classList.remove('light');
        localStorage.setItem('theme', theme);
    }

    function setLanguage(lang) {
        localStorage.setItem('lang', lang);
        // Można dodać proste tłumaczenia, jeśli potrzeba
    }

    function renderSubscriptionPlans(currentPlan) {
        const plans = [
            { name: 'Free', description: 'Podstawowy dostęp', price: '0 zł' },
            { name: 'Better', description: 'Rozszerzone funkcje', price: '29 zł/mc' },
            { name: 'Premium', description: 'Pełny dostęp', price: '99 zł/mc' }
        ];
        const container = document.getElementById("subscriptionPlans");
        container.innerHTML = plans.map(plan => `
            <div class="plan-card ${currentPlan?.toLowerCase() === plan.name.toLowerCase() ? 'current' : ''}">
                <h3>${plan.name}</h3>
                <p>${plan.description}</p>
                <p>${plan.price}</p>
                ${currentPlan?.toLowerCase() === plan.name.toLowerCase() ? '<p><strong>Aktualny plan</strong></p>' : ''}
            </div>
        `).join('');
    }

    async function loadAdminPanel() {
        try {
            const users = await apiRequest('/admin/users');
            const tbody = document.getElementById("adminTableBody");
            tbody.innerHTML = '';
            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>
                        <select class="admin-select" data-username="${user.username}" data-field="role">
                            <option value="USER" ${user.role === 'USER' ? 'selected' : ''}>USER</option>
                            <option value="ADMIN" ${user.role === 'ADMIN' ? 'selected' : ''}>ADMIN</option>
                        </select>
                    </td>
                    <td>
                        <select class="admin-select" data-username="${user.username}" data-field="subscription">
                            <option value="FREE" ${user.subscription === 'FREE' ? 'selected' : ''}>FREE</option>
                            <option value="BETTER" ${user.subscription === 'BETTER' ? 'selected' : ''}>BETTER</option>
                            <option value="PREMIUM" ${user.subscription === 'PREMIUM' ? 'selected' : ''}>PREMIUM</option>
                        </select>
                    </td>
                    <td>
                        <button class="admin-btn toggle-block" data-username="${user.username}">${user.blocked ? 'Odblokuj' : 'Zablokuj'}</button>
                    </td>
                    <td></td>
                `;
                tbody.appendChild(tr);
            });
            // Eventy dla selectów i przycisków
            document.querySelectorAll('.admin-select').forEach(select => {
                select.addEventListener('change', async (e) => {
                    const username = select.getAttribute('data-username');
                    const field = select.getAttribute('data-field');
                    const newValue = select.value;
                    try {
                        await apiRequest(`/admin/users/${username}/${field}`, {
                            method: 'PUT',
                            body: JSON.stringify({ value: newValue })
                        });
                        // Odśwież panel
                        await loadAdminPanel();
                    } catch (err) {
                        alert('Błąd aktualizacji: ' + err.message);
                    }
                });
            });
            document.querySelectorAll('.toggle-block').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const username = btn.getAttribute('data-username');
                    try {
                        await apiRequest(`/admin/users/${username}/block`, { method: 'PUT' });
                        await loadAdminPanel();
                    } catch (err) {
                        alert('Błąd blokowania: ' + err.message);
                    }
                });
            });
        } catch (err) {
            console.error('Błąd ładowania panelu admina:', err);
        }
    }

    // Builder (instalacja symulowana)
    document.addEventListener('DOMContentLoaded', () => {
        const logoUploadDiv = document.getElementById("logoUpload");
        const logoFileInput = document.getElementById("logoFile");
        if (logoUploadDiv && logoFileInput) {
            logoUploadDiv.onclick = () => logoFileInput.click();
            logoFileInput.onchange = (e) => {
                if (e.target.files.length) logoUploadDiv.innerHTML = `<i class="fas fa-check"></i> Wybrano: ${e.target.files[0].name}`;
            };
        }
        const buildBtn = document.getElementById("buildAppBtn");
        if (buildBtn) {
            buildBtn.onclick = () => {
                const appName = document.getElementById("appName").value.trim();
                const appSize = document.getElementById("appSize").value;
                if (!appName) {
                    alert("Podaj nazwę aplikacji");
                    return;
                }
                const progressContainer = document.getElementById("progressContainer");
                const progressFill = document.getElementById("progressFill");
                const progressText = document.getElementById("progressText");
                progressContainer.style.display = "block";
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    progressFill.style.width = progress + "%";
                    progressText.innerText = `Instalacja... ${progress}%`;
                    if (progress >= 100) {
                        clearInterval(interval);
                        progressText.innerText = "Instalacja zakończona! Pobieranie pliku...";
                        const blob = new Blob(["Symulacja instalacji aplikacji " + appName], {type: "application/octet-stream"});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${appName}.exe`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        setTimeout(() => {
                            alert(`Aplikacja "${appName}" (${appSize}) została zainstalowana.`);
                            progressContainer.style.display = "none";
                            progressFill.style.width = "0%";
                        }, 1000);
                    }
                }, 200);
            };
        }
    });

    // Start aplikacji
    if (localStorage.getItem('token')) {
        showDashboard().catch(() => renderAuth("login"));
    } else {
        renderAuth("login");
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
